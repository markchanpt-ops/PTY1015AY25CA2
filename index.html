<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PTY1015 CA2 — Objective Result Lookup</title>
<style>
:root{
  --ink:#1b1e23;
  --ink-soft:#5b6470;
  --paper:#fafaf8;
  --panel:#ffffff;
  --line:#e3e2dd;
  --accent:#0e6e5c;
  --accent-soft:#e6f1ee;
  --caution:#b45309;
  --caution-soft:#fdf3e7;
  --danger:#b3261e;
  --radius:10px;
  --fs-base:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  background:var(--paper);
  color:var(--ink);
  font-size:var(--fs-base);
  line-height:1.45;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:1rem}
.screen{display:none;min-height:100vh}
.screen.active{display:block}

/* ---------- shared ---------- */
.btn{
  display:inline-flex;align-items:center;gap:.4em;
  border:1px solid var(--line);background:var(--panel);color:var(--ink);
  padding:.55em 1em;border-radius:var(--radius);font-size:.95rem;font-weight:500;
}
.btn:hover{border-color:var(--ink-soft)}
.btn:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{
  outline:2px solid var(--accent);outline-offset:2px;
}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#0a5a4b}
.btn.danger{color:var(--danger);border-color:#e6c4c2}
.btn.small{padding:.3em .65em;font-size:.82rem;border-radius:7px}
.btn.ghost{border-color:transparent;background:transparent;color:var(--ink-soft)}
.btn.ghost:hover{color:var(--ink)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.82rem;font-weight:600;color:var(--ink-soft);
  text-transform:uppercase;letter-spacing:.04em;margin-bottom:.35rem}
.field input[type=text],.field input[type=password],.field input[type=number],
.field select,.field textarea{
  width:100%;padding:.6em .75em;border:1px solid var(--line);border-radius:var(--radius);
  background:#fff;color:var(--ink);
}
.field textarea{min-height:5em;resize:vertical}
.muted{color:var(--ink-soft)}
.tag{display:inline-block;font-size:.72rem;font-weight:600;letter-spacing:.03em;
  padding:.15em .55em;border-radius:99px;background:var(--accent-soft);color:var(--accent)}
.tag.warn{background:var(--caution-soft);color:var(--caution)}
.tag.grey{background:#eeede9;color:var(--ink-soft)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:1rem 1.1rem}
hr.sep{border:none;border-top:1px solid var(--line);margin:1rem 0}
.row{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap}
.spread{display:flex;justify-content:space-between;align-items:center;gap:.6rem;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
@media(max-width:680px){.grid2{grid-template-columns:1fr}}

/* ---------- role screen ---------- */
#s-role{display:none}
#s-role.active{display:flex;align-items:center;justify-content:center;padding:2rem}
.role-box{max-width:420px;width:100%;text-align:center}
.role-box h1{font-size:1.5rem;margin-bottom:.25rem;letter-spacing:-.01em}
.role-box .sub{color:var(--ink-soft);margin-bottom:2rem}
.role-btn{display:block;width:100%;padding:1.1rem;margin-bottom:.8rem;font-size:1.05rem;
  border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);font-weight:600}
.role-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ---------- centred forms ---------- */
.centred{align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.screen.centred.active{display:flex}
.form-box{max-width:440px;width:100%;background:var(--panel);border:1px solid var(--line);
  border-radius:14px;padding:1.8rem}
.form-box h2{font-size:1.2rem;margin-bottom:1.2rem}

/* ---------- SP screen ---------- */
#s-sp{padding-bottom:4rem}
.sp-header{
  position:sticky;top:0;z-index:20;background:var(--panel);
  border-bottom:1px solid var(--line);padding:.7rem 1rem;
}
.sp-header .meta{display:flex;gap:1.2rem;flex-wrap:wrap;align-items:baseline}
.sp-header .meta b{font-weight:700}
.sp-header .label{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;
  color:var(--ink-soft);display:block}
.fontsize-ctl{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.fontsize-ctl button{border:none;background:#fff;padding:.35em .7em;font-size:.85rem;border-right:1px solid var(--line)}
.fontsize-ctl button:last-child{border-right:none}
.fontsize-ctl button.on{background:var(--accent);color:#fff}
.sp-body{max-width:880px;margin:0 auto;padding:1.2rem 1rem}
.searchwrap{position:relative;margin-bottom:1.2rem}
#sp-search{
  width:100%;padding:.85em 1em .85em 2.6em;font-size:1.1rem;
  border:2px solid var(--line);border-radius:12px;background:#fff;
}
#sp-search:focus{border-color:var(--accent)}
.searchwrap .icon{position:absolute;left:.9em;top:50%;transform:translateY(-50%);color:var(--ink-soft)}
.breadcrumb{margin-bottom:.9rem;font-size:.92rem;color:var(--ink-soft)}
.breadcrumb a{color:var(--accent);text-decoration:none;cursor:pointer}
.breadcrumb a:hover{text-decoration:underline}
.tile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.7rem}
.tile{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:.95rem 1rem;text-align:left;font-size:1rem;font-weight:600}
.tile:hover{border-color:var(--accent);color:var(--accent)}
.tile .count{display:block;font-size:.78rem;font-weight:400;color:var(--ink-soft);margin-top:.2rem}
.preview{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:.85rem 1rem;margin-bottom:.6rem;display:flex;justify-content:space-between;
  align-items:center;gap:1rem;flex-wrap:wrap}
.preview .pname{font-weight:700;font-size:1.05rem}
.preview .pmeta{font-size:.82rem;color:var(--ink-soft);margin-top:.15rem}
.preview .paliases{font-size:.82rem;color:var(--ink-soft)}
.empty-note{color:var(--ink-soft);padding:1.4rem 0;text-align:center}

/* ---------- result overlay ---------- */
.overlay{position:fixed;inset:0;background:rgba(20,22,26,.45);z-index:50;display:none;
  align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.overlay.open{display:flex}
.result-card{background:var(--panel);border-radius:16px;max-width:760px;width:100%;
  padding:1.6rem 1.7rem;position:relative}
.result-card .closer{position:absolute;top:.9rem;right:.9rem}
.result-card h2{font-size:1.45rem;letter-spacing:-.01em;margin-bottom:.15rem;padding-right:2.5rem}
.result-card .rc-meta{color:var(--ink-soft);font-size:.88rem;margin-bottom:.9rem}
.sidesel{display:flex;gap:.5rem;margin:.9rem 0 1.1rem;flex-wrap:wrap}
.sidesel button{padding:.55em 1.3em;border-radius:99px;border:1.5px solid var(--line);
  background:#fff;font-weight:600;font-size:.95rem}
.sidesel button.on{background:var(--accent);border-color:var(--accent);color:#fff}
.result-block{border:1px solid var(--line);border-left:4px solid var(--accent);
  border-radius:8px;padding:1rem 1.1rem;margin-bottom:.8rem;background:#fff}
.result-block .side-lab{font-size:.72rem;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;color:var(--accent);margin-bottom:.3rem}
.result-block .rtext{font-size:1.15rem;font-weight:500;white-space:pre-line}
.result-block .pwording{margin-top:.6rem;font-style:italic;color:var(--ink-soft)}
.result-block .pwording::before{content:"Patient says: ";font-style:normal;font-weight:600;
  font-size:.8rem;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft)}
.caution-block{background:var(--caution-soft);border:1px solid #f0ddc2;border-radius:8px;
  padding:.7rem 1rem;color:var(--caution);font-size:.92rem;margin-top:.4rem}
.caution-block b{text-transform:uppercase;font-size:.75rem;letter-spacing:.05em}
.logged-note{font-size:.78rem;color:var(--ink-soft);margin-top:1rem;display:flex;gap:.4em;align-items:center}

/* SP font scaling */
#s-sp[data-fs="m"]{--fs-base:18px}
#s-sp[data-fs="l"]{--fs-base:21px}
#s-sp[data-fs="xl"]{--fs-base:25px}
#s-sp[data-fs]{font-size:var(--fs-base)}
#s-sp .result-block .rtext{font-size:1.25em}

/* ---------- admin ---------- */
.admin-top{background:var(--ink);color:#fff;padding:.75rem 1.2rem;display:flex;
  justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap}
.admin-top h1{font-size:1.02rem;font-weight:600;letter-spacing:.01em}
.admin-top .btn{background:transparent;color:#d6d8db;border-color:#3a3f47}
.admin-top .btn:hover{color:#fff;border-color:#777}
.tabs{display:flex;gap:.15rem;background:var(--panel);border-bottom:1px solid var(--line);
  padding:0 1.2rem;overflow-x:auto}
.tabs button{border:none;background:none;padding:.8em 1em;font-size:.93rem;font-weight:600;
  color:var(--ink-soft);border-bottom:2.5px solid transparent;white-space:nowrap}
.tabs button.on{color:var(--accent);border-bottom-color:var(--accent)}
.admin-body{max-width:1080px;margin:0 auto;padding:1.4rem 1.2rem 4rem}
table.data{width:100%;border-collapse:collapse;font-size:.86rem;background:var(--panel);
  border:1px solid var(--line);border-radius:var(--radius)}
table.data th,table.data td{padding:.5em .65em;border-bottom:1px solid var(--line);
  text-align:left;vertical-align:top}
table.data th{font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;
  color:var(--ink-soft);background:#f4f3ef}
table.data tr:last-child td{border-bottom:none}
.list-item{display:flex;justify-content:space-between;align-items:center;gap:.6rem;
  padding:.55rem .7rem;border:1px solid var(--line);border-radius:8px;margin-bottom:.45rem;
  background:var(--panel);flex-wrap:wrap}
.list-item .li-name{font-weight:600}
.list-item.sub{margin-left:1.4rem;background:#fcfcfa}
.editor-cols{display:grid;grid-template-columns:340px 1fr;gap:1.2rem}
@media(max-width:860px){.editor-cols{grid-template-columns:1fr}}
.panel-h{font-size:.8rem;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);
  font-weight:700;margin:1.1rem 0 .5rem}
.modal{position:fixed;inset:0;background:rgba(20,22,26,.45);z-index:60;display:none;
  align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.modal.open{display:flex}
.modal-box{background:var(--panel);border-radius:14px;max-width:720px;width:100%;padding:1.5rem 1.6rem}
.modal-box h3{margin-bottom:1rem}
.filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.6rem;margin-bottom:1rem}
.filters .field{margin-bottom:0}
.kpi-row{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1rem}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:.7rem 1rem;min-width:120px}
.kpi b{display:block;font-size:1.3rem}
.kpi span{font-size:.78rem;color:var(--ink-soft)}
.io-block{margin-bottom:1.6rem}
.toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;padding:.6em 1.2em;border-radius:99px;font-size:.9rem;
  z-index:99;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<!-- ================= ROLE SELECT ================= -->
<div class="screen" id="s-role">
  <div class="role-box">
    <h1>PTY1015 CA2 — Objective Result Lookup</h1>
    <p class="sub">Standardised result bank for practical case assessment</p>
    <button class="role-btn" onclick="App.gotoSPSetup()">SP / Examiner</button>
    <button class="role-btn" onclick="App.gotoAdminLogin()">Admin</button>
  </div>
</div>

<!-- ================= SP SESSION SETUP ================= -->
<div class="screen centred" id="s-sp-setup">
  <div class="form-box">
    <h2>Start assessment session</h2>
    <div class="field"><label for="sp-name">Your name (SP / examiner)</label>
      <input type="text" id="sp-name" placeholder="e.g. Tan Mei Ling"></div>
    <div class="field"><label for="sp-case">Case</label>
      <select id="sp-case"></select></div>
    <div class="field"><label for="sp-session">Assessment session</label>
      <input type="text" id="sp-session" placeholder="e.g. AY25 CA2 Run 1, Station 3"></div>
    <div class="field"><label for="sp-group">Group number</label>
      <input type="text" id="sp-group" placeholder="e.g. 14" inputmode="numeric"></div>
    <div class="field"><label for="sp-pass">SP passcode</label>
      <input type="password" id="sp-pass" onkeydown="if(event.key==='Enter')App.startSPSession()"></div>
    <div class="row">
      <button class="btn primary" onclick="App.startSPSession()">Start session</button>
      <button class="btn ghost" onclick="App.show('s-role')">Back</button>
    </div>
  </div>
</div>

<!-- ================= ADMIN LOGIN ================= -->
<div class="screen centred" id="s-admin-login">
  <div class="form-box">
    <h2>Admin login</h2>
    <div class="field"><label for="admin-pass">Passcode</label>
      <input type="password" id="admin-pass" onkeydown="if(event.key==='Enter')App.adminLogin()"></div>
    <div class="row">
      <button class="btn primary" onclick="App.adminLogin()">Log in</button>
      <button class="btn ghost" onclick="App.show('s-role')">Back</button>
    </div>
    <p class="muted" style="margin-top:1rem;font-size:.82rem">Default passcode is <code>admin</code>. Change it under Settings after first login.</p>
  </div>
</div>

<!-- ================= SP MAIN ================= -->
<div class="screen" id="s-sp" data-fs="m">
  <div class="sp-header">
    <div class="spread">
      <div class="meta">
        <div><span class="label">Case</span><b id="h-case"></b></div>
        <div><span class="label">Group</span><b id="h-group"></b></div>
        <div><span class="label">Session</span><b id="h-session"></b></div>
        <div><span class="label">SP / Examiner</span><b id="h-sp"></b></div>
      </div>
      <div class="row">
        <div class="fontsize-ctl" role="group" aria-label="Font size">
          <button data-fs="s" onclick="App.setFont('s')">S</button>
          <button data-fs="m" onclick="App.setFont('m')" class="on">M</button>
          <button data-fs="l" onclick="App.setFont('l')">L</button>
          <button data-fs="xl" onclick="App.setFont('xl')">XL</button>
        </div>
        <button class="btn small" onclick="App.changeGroup()">Change group</button>
        <button class="btn small ghost" onclick="App.endSPSession()">End session</button>
      </div>
    </div>
  </div>
  <div class="sp-body">
    <div class="searchwrap">
      <span class="icon">&#128269;</span>
      <input type="search" id="sp-search" placeholder="Search test name or alias…" autocomplete="off"
        oninput="App.onSearch(this.value)">
    </div>
    <div class="row" style="margin-bottom:.7rem" id="sp-nav">
      <button class="btn small" id="sp-back" onclick="App.goBack()">← Back</button>
      <button class="btn small" id="sp-home" onclick="App.goHome()">⌂ Home</button>
      <span class="breadcrumb" id="sp-crumb" style="margin-bottom:0"></span>
    </div>
    <div id="sp-content"></div>
  </div>
</div>

<!-- ================= RESULT OVERLAY ================= -->
<div class="overlay" id="card-overlay" onclick="if(event.target===this)App.closeCard()">
  <div class="result-card" id="result-card"></div>
</div>

<!-- ================= ADMIN ================= -->
<div class="screen" id="s-admin">
  <div class="admin-top">
    <h1>Admin — PTY1015 CA2 Result Lookup</h1>
    <div class="row">
      <button class="btn small" onclick="App.adminLogout()">Log out</button>
    </div>
  </div>
  <div class="tabs" id="admin-tabs">
    <button data-tab="cases" class="on" onclick="App.adminTab('cases')">Cases</button>
    <button data-tab="editor" onclick="App.adminTab('editor')">Structure &amp; test cards</button>
    <button data-tab="logs" onclick="App.adminTab('logs')">Access log</button>
    <button data-tab="io" onclick="App.adminTab('io')">Import / Export</button>
    <button data-tab="settings" onclick="App.adminTab('settings')">Settings</button>
  </div>
  <div class="admin-body" id="admin-body"></div>
</div>

<!-- ================= CARD EDIT MODAL ================= -->
<div class="modal" id="edit-modal" onclick="if(event.target===this)App.closeModal()">
  <div class="modal-box" id="modal-box"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* =====================================================
   PTY1015 CA2 Objective Result Lookup
   Single-file app. Data persists in this browser's
   localStorage. Use Import/Export to move data between
   devices or to consolidate logs after an assessment.
   ===================================================== */

const DB_KEY = "PTY1015_LOOKUP_DB_V2";
const SES_KEY = "PTY1015_LOOKUP_SESSION_V1";

/* ---------------- utilities ---------------- */
const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({
  "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const uid = p => (p||"id") + "_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2,7);
const nowISO = () => new Date().toISOString();
const norm = s => String(s||"").toLowerCase().replace(/[^a-z0-9]+/g," ").trim().replace(/\s+/g," ");
function lev(a, b){
  if (Math.abs(a.length - b.length) > 2) return 99;
  const m = a.length, n = b.length;
  const d = Array.from({length:m+1}, (_,i)=>[i, ...Array(n).fill(0)]);
  for (let j=1;j<=n;j++) d[0][j]=j;
  for (let i=1;i<=m;i++) for (let j=1;j<=n;j++){
    d[i][j] = Math.min(d[i-1][j]+1, d[i][j-1]+1, d[i-1][j-1] + (a[i-1]===b[j-1]?0:1));
    if (i>1 && j>1 && a[i-1]===b[j-2] && a[i-2]===b[j-1])
      d[i][j] = Math.min(d[i][j], d[i-2][j-2]+1); // transposition
  }
  return d[m][n];
}
function toast(msg){
  const t = $("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove("show"), 2200);
}
function download(filename, text, mime){
  const blob = new Blob([text], {type: mime || "application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();}, 400);
}
function csvCell(v){
  v = String(v ?? "");
  return /[",\n]/.test(v) ? '"' + v.replace(/"/g,'""') + '"' : v;
}

/* ---------------- data layer ---------------- */
let DB = null;

function loadDB(){
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (raw) {
      DB = JSON.parse(raw);
      if (!DB.settings.spPass) { DB.settings.spPass = "sp1015"; saveDB(); }
      return;
    }
  } catch(e){ console.warn("DB load failed", e); }
  DB = seedDB();
  saveDB();
}
function saveDB(){ localStorage.setItem(DB_KEY, JSON.stringify(DB)); }

function getCase(id){ return DB.cases.find(c => c.case_id === id); }
function getCat(cs, id){ return (cs.categories||[]).find(c => c.category_id === id); }
function getSub(cat, id){ return (cat.subcategories||[]).find(s => s.subcategory_id === id); }
function catName(cs, id){ const c = getCat(cs,id); return c ? c.category_name : ""; }
function subName(cs, catId, subId){
  const c = getCat(cs,catId); if (!c) return "";
  const s = getSub(c, subId); return s ? s.subcategory_name : "";
}
function audit(caseId, action, detail){
  DB.audit.push({ audit_id: uid("aud"), case_id: caseId, actor: "admin",
    action, detail: detail||"", timestamp: nowISO() });
}

/* ---------------- seed data ---------------- */
function seedDB(){
  const cats = [
    ["observation","Observation",["Global posture","Local shoulder/scapular observation"]],
    ["functional","Functional assessment",["Overhead tasks","Hand behind neck/back","Sport-specific task"]],
    ["palpation","Palpation",["Rotator cuff/subacromial","Biceps/anterior shoulder","ACJ/SCJ","Posterior shoulder/scapular muscles"]],
    ["rom","ROM",["AROM","PROM","Functional ROM"]],
    ["mlt","MLT",["Cervicoscapular","Pectoral/anterior shoulder"]],
    ["accessory","Accessory movements",["GHJ","ACJ","SCJ"]],
    ["mmt","MMT",["Scapular muscles","Shoulder flexion/abduction/extension","Shoulder rotation","Pectoral/horizontal movements"]],
    ["special","Special tests",["Rotator cuff-related shoulder pain","Rotator cuff integrity","Long head of biceps","Instability","SLAP/labral","ACJ","Symptom modification"]],
    ["cervneuro","Cervical / neurological screen",["Cervical AROM","Dermatomes","Myotomes","Reflexes","Neurodynamic tests"]]
  ].map(([id,name,subs],i)=>({
    category_id:id, category_name:name, display_order:i+1, visible_status:true,
    subcategories: subs.map((s,j)=>({
      subcategory_id: id + "_" + norm(s).replace(/ /g,"_"),
      subcategory_name: s, display_order: j+1, visible_status:true
    }))
  }));
  const sub = (catId, frag) => {
    const c = cats.find(c=>c.category_id===catId);
    return c.subcategories.find(s=>s.subcategory_id.includes(frag)).subcategory_id;
  };
  // ss: side-specific card; ns: not side-specific card
  let ord = 0;
  const ss = (id,name,aliases,catId,subFrag,r,rpw,l,lpw,flag) => ({
    test_card_id:id, test_name:name, aliases, category_id:catId,
    subcategory_id:sub(catId,subFrag), is_side_specific:true,

      assessment_name: "PTY1015 CA2 Practical",
      created_by: "admin", created_at: nowISO(), updated_at: nowISO(),

      categories: cats,
      test_cards: testCards
    }],

}

/* ---------------- app controller ---------------- */
const App = {
  session: null,        // {sp, caseId, sessionName, group}
  adminAuthed: false,
  browse: { cat: null, sub: null },
  searchQ: "",
  currentTab: "cases",
  editorCaseId: null,

  init(){
    loadDB();
    const ses = sessionStorage.getItem(SES_KEY);
    if (ses) {
      try {
        this.session = JSON.parse(ses);
        if (getCase(this.session.caseId)) { this.enterSP(); return; }
      } catch(e){}
      this.session = null;
    }
    this.show("s-role");
  },

  show(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    $(id).classList.add("active");
    window.scrollTo(0,0);
  },

  /* ============ SP session ============ */
  gotoSPSetup(){
    const sel = $("sp-case");
    sel.innerHTML = DB.cases.map(c =>
      `<option value="${esc(c.case_id)}">${esc(c.case_name)}${c.locked_status?" (locked)":""}</option>`).join("");
    this.show("s-sp-setup");
  },

  startSPSession(){
    const sp = $("sp-name").value.trim();
    const caseId = $("sp-case").value;
    const sessionName = $("sp-session").value.trim();
    const group = $("sp-group").value.trim();
    if (!sp || !caseId || !sessionName || !group){ toast("Fill in all fields to start."); return; }
    if ($("sp-pass").value !== DB.settings.spPass){ toast("Incorrect SP passcode."); return; }
    $("sp-pass").value = "";
    this.session = { sp, caseId, sessionName, group };
    sessionStorage.setItem(SES_KEY, JSON.stringify(this.session));
    this.enterSP();
  },

  enterSP(){
    const cs = getCase(this.session.caseId);
    $("h-case").textContent = cs.case_name;
    $("h-group").textContent = this.session.group;
    $("h-session").textContent = this.session.sessionName;
    $("h-sp").textContent = this.session.sp;
    const fs = sessionStorage.getItem("PTY1015_FS") || "m";
    this.setFont(fs, true);
    this.browse = { cat:null, sub:null };
    this.searchQ = "";
    $("sp-search").value = "";
    this.show("s-sp");
    this.renderSP();
  },

  changeGroup(){
    const g = prompt("Enter new group number:", this.session.group);
    if (g === null) return;
    const gv = g.trim();
    if (!gv){ toast("Group number cannot be blank."); return; }
    this.session.group = gv;
    sessionStorage.setItem(SES_KEY, JSON.stringify(this.session));
    $("h-group").textContent = gv;

  endSPSession(){
    if (!confirm("End this session? Access logs are kept.")) return;
    this.session = null;
    sessionStorage.removeItem(SES_KEY);
    this.show("s-role");

  setFont(fs, silent){
    $("s-sp").setAttribute("data-fs", fs);
    sessionStorage.setItem("PTY1015_FS", fs);
    document.querySelectorAll(".fontsize-ctl button").forEach(b =>
      b.classList.toggle("on", b.dataset.fs === fs));
    if (!silent) toast("Font size: " + fs.toUpperCase());
  },

  /* ============ SP search & browse ============ */
  onSearch(q){
    this.searchQ = q;
    this.renderSP();
  },

  renderSP(){
    const cs = getCase(this.session.caseId);
    const content = $("sp-content");
    const crumb = $("sp-crumb");
    const q = this.searchQ.trim();
    this.updateNavButtons();

    if (q){
      crumb.innerHTML = `Search results for “${esc(q)}” &nbsp;·&nbsp; <a onclick="App.clearSearch()">clear</a>`;
      const hits = this.searchCards(cs, q);
      content.innerHTML = hits.length
        ? hits.map(c => this.previewHTML(cs, c, "search")).join("")
        : `<div class="empty-note">No matching test found. Try a shorter fragment of the name, or browse by category below.<br><br>
           <button class="btn" onclick="App.clearSearch()">Browse categories</button></div>`;
      return;
    }

    const b = this.browse;
    if (!b.cat){
      crumb.textContent = "Browse by category";
      const cats = (cs.categories||[]).filter(c=>c.visible_status!==false)
        .slice().sort((a,b)=>a.display_order-b.display_order);
      content.innerHTML = `<div class="tile-grid">` + cats.map(c=>{
        const n = cs.test_cards.filter(t=>t.category_id===c.category_id && t.active_status!==false).length;
        return `<button class="tile" onclick="App.openCat('${esc(c.category_id)}')">${esc(c.category_name)}
          <span class="count">${n} test${n===1?"":"s"}</span></button>`;
      }).join("") + `</div>`;
      return;
    }

    const cat = getCat(cs, b.cat);
    if (!b.sub){
      crumb.innerHTML = `<a onclick="App.openHome()">All categories</a> › ${esc(cat.category_name)}`;
      const subs = (cat.subcategories||[]).filter(s=>s.visible_status!==false)
        .slice().sort((a,b)=>a.display_order-b.display_order);
      content.innerHTML = `<div class="tile-grid">` + subs.map(s=>{
        const n = cs.test_cards.filter(t=>t.subcategory_id===s.subcategory_id && t.active_status!==false).length;
        return `<button class="tile" onclick="App.openSub('${esc(s.subcategory_id)}')">${esc(s.subcategory_name)}
          <span class="count">${n} test${n===1?"":"s"}</span></button>`;
      }).join("") + `</div>`;
      return;
    }

    crumb.innerHTML = `<a onclick="App.openHome()">All categories</a> ›
      <a onclick="App.openCat('${esc(cat.category_id)}')">${esc(cat.category_name)}</a> ›
      ${esc(subName(cs, b.cat, b.sub))}`;
    const cards = cs.test_cards
      .filter(t=>t.subcategory_id===b.sub && t.active_status!==false)
      .slice().sort((a,b)=>(a.display_order||0)-(b.display_order||0));
    content.innerHTML = cards.length
      ? cards.map(c=>this.previewHTML(cs, c, "browse")).join("")
      : `<div class="empty-note">No tests in this subcategory.</div>`;
  },

  clearSearch(){ this.searchQ=""; $("sp-search").value=""; this.renderSP(); },
  openHome(){ this.browse={cat:null,sub:null}; this.renderSP(); },
  openCat(id){ this.browse={cat:id,sub:null}; this.renderSP(); },
  openSub(id){ this.browse.sub=id; this.renderSP(); },

  goBack(){
    if (this.searchQ.trim()) { this.clearSearch(); return; }
    if (this.browse.sub) { this.browse.sub = null; }
    else if (this.browse.cat) { this.browse.cat = null; }
    this.renderSP();
  },
  goHome(){
    this.searchQ = ""; $("sp-search").value = "";
    this.browse = { cat:null, sub:null };
    this.renderSP();
  },
  updateNavButtons(){
    const atHome = !this.searchQ.trim() && !this.browse.cat;
    $("sp-back").disabled = atHome;
    $("sp-home").disabled = atHome;
  },

  previewHTML(cs, card, source){
    return `<div class="preview">
      <div>
        <div class="pname">${esc(card.test_name)}</div>
        <div class="pmeta">${esc(catName(cs,card.category_id))} › ${esc(subName(cs,card.category_id,card.subcategory_id))}
          ${card.response_flag ? ` &nbsp;<span class="tag">${esc(card.response_flag)}</span>` : ""}</div>
        ${card.aliases && card.aliases.length ? `<div class="paliases">Also: ${esc(card.aliases.join(", "))}</div>` : ""}
      </div>
      <button class="btn primary" onclick="App.openCard('${esc(card.test_card_id)}','${source}')">Open result</button>
    </div>`;
  },

  searchCards(cs, q){
    const qn = norm(q);
    if (!qn) return [];
    const qTokens = qn.split(" ");
    const scored = [];
    for (const card of cs.test_cards){
      if (card.active_status === false) continue;
      const names = [card.test_name, ...(card.aliases||[])].map(norm).filter(Boolean);
      let best = 0;
      for (const n of names){
        if (n === qn) { best = Math.max(best, 100); continue; }
        const initials = n.split(" ").map(w=>w[0]).join("");
        if (initials === qn.replace(/ /g,"")) { best = Math.max(best, 85); }
        if (n.startsWith(qn)) best = Math.max(best, 90);
        else if (n.includes(qn)) best = Math.max(best, 80);
        const nTokens = n.split(" ");
        const allExact = qTokens.every(qt => nTokens.some(nt => nt===qt || nt.startsWith(qt)));
        if (allExact) best = Math.max(best, 70);
        else {
          const allFuzzy = qTokens.every(qt =>
            nTokens.some(nt => nt===qt || nt.startsWith(qt) ||
              (qt.length>=5 && lev(qt,nt)<=2) ||
              (qt.length>=3 && lev(qt,nt)<=1)));
          if (allFuzzy) best = Math.max(best, 50);
        }
      }
      if (best > 0) scored.push([best, card]);
    }
    scored.sort((a,b)=> b[0]-a[0] || (a[1].display_order||0)-(b[1].display_order||0));
    return scored.map(s=>s[1]);
  },

  /* ============ result card & release logging ============ */
  openCardCtx: null, // {cardId, source}

  openCard(cardId, source){
    this.openCardCtx = { cardId, source };
    const cs = getCase(this.session.caseId);
    const card = cs.test_cards.find(t=>t.test_card_id===cardId);
    if (!card) return;
    const box = $("result-card");
    let inner = `
      <button class="btn small closer" onclick="App.closeCard()">Close ✕</button>
      <h2>${esc(card.test_name)}</h2>
      <div class="rc-meta">${esc(catName(cs,card.category_id))} › ${esc(subName(cs,card.category_id,card.subcategory_id))}
        ${card.response_flag ? ` &nbsp;<span class="tag">${esc(card.response_flag)}</span>` : ""}</div>`;
    if (card.is_side_specific){
      inner += `
      <p class="muted">Show only the side(s) the student actually tested.</p>
      <div class="sidesel" id="sidesel">
        <button onclick="App.showSide('right')">Right</button>
        <button onclick="App.showSide('left')">Left</button>
        <button onclick="App.showSide('both')">Both sides</button>
      </div>
      <div id="side-results"></div>`;
    } else {
      inner += `<div id="side-results"></div>`;
    }
    box.innerHTML = inner;
    $("card-overlay").classList.add("open");
    if (!card.is_side_specific){
      this.renderResults(card, "not_side_specific");
      this.logRelease(cs, card, "not_side_specific", source);
    }
  },

  showSide(side){
    const cs = getCase(this.session.caseId);
    const card = cs.test_cards.find(t=>t.test_card_id===this.openCardCtx.cardId);
    document.querySelectorAll("#sidesel button").forEach(b=>
      b.classList.toggle("on", b.textContent.toLowerCase().startsWith(side==="both"?"both":side)));
    this.renderResults(card, side);
    this.logRelease(cs, card, side, this.openCardCtx.source);
  },

  resultBlock(label, r){
    if (!r || !r.result_text) return `<div class="result-block">
      <div class="side-lab">${esc(label)}</div>
      <div class="rtext muted">No approved result recorded for this side.</div></div>`;
    return `<div class="result-block">
      ${label ? `<div class="side-lab">${esc(label)}</div>` : ""}
      <div class="rtext">${esc(r.result_text)}</div>
      ${r.patient_wording ? `<div class="pwording">“${esc(r.patient_wording)}”</div>` : ""}
    </div>`;
  },

  renderResults(card, side){
    const wrap = $("side-results");
    const R = card.results || {};
    let html = "";
    if (side === "right") html = this.resultBlock("Right", R.right);
    else if (side === "left") html = this.resultBlock("Left", R.left);
    else if (side === "both"){
      if (R.bilateral && R.bilateral.result_text) html = this.resultBlock("Both sides", R.bilateral);
      else html = this.resultBlock("Right", R.right) + this.resultBlock("Left", R.left);
    } else {
      html = this.resultBlock("", R.single || R.not_side_specific);
    }
    if (card.caution_note)
      html += `<div class="caution-block"><b>Caution</b> — ${esc(card.caution_note)}</div>`;
    html += `<div class="logged-note">✓ Logged as released to group ${esc(this.session.group)}.</div>`;
    wrap.innerHTML = html;
  },

  closeCard(){
    $("card-overlay").classList.remove("open");
    this.openCardCtx = null;
  },

  logRelease(cs, card, side, source){
    const s = this.session;
    const prior = DB.logs.some(l =>
      l.case_id===cs.case_id && l.assessment_session===s.sessionName &&
      l.group_number===s.group && l.test_card_id===card.test_card_id && l.side_viewed===side);
    const R = card.results || {};
    let pw = false;
    if (side==="right") pw = !!(R.right && R.right.patient_wording);
    else if (side==="left") pw = !!(R.left && R.left.patient_wording);
    else if (side==="both") pw = !!((R.right&&R.right.patient_wording)||(R.left&&R.left.patient_wording)||(R.bilateral&&R.bilateral.patient_wording));
    else pw = !!((R.single&&R.single.patient_wording)||(R.not_side_specific&&R.not_side_specific.patient_wording));
    DB.logs.push({
      log_id: uid("log"),
      case_id: cs.case_id,
      case_name: cs.case_name,
      assessment_session: s.sessionName,
      group_number: s.group,
      sp_examiner_user: s.sp,
      test_card_id: card.test_card_id,
      test_name: card.test_name,
      category_id: card.category_id,
      category_name: catName(cs, card.category_id),
      subcategory_id: card.subcategory_id,
      subcategory_name: subName(cs, card.category_id, card.subcategory_id),
      side_viewed: side,
      result_viewed: true,
      patient_wording_viewed: pw,
      accessed_from: source,
      repeat_view: prior,
      timestamp: nowISO()
    });
    saveDB();
  },

  adminLogout(){ this.adminAuthed=false; this.show("s-role"); },

    this.currentTab = tab;
    document.querySelectorAll("#admin-tabs button").forEach(b=>
      b.classList.toggle("on", b.dataset.tab===tab));
    const render = { cases:this.renderCases, editor:this.renderEditor,
      logs:this.renderLogs, io:this.renderIO, settings:this.renderSettings };
    render[tab].call(this);
  },

  /* ============ admin: cases ============ */
  renderCases(){
    const body = $("admin-body");
    body.innerHTML = `
      <div class="spread" style="margin-bottom:1rem">
        <h2 style="font-size:1.1rem">Cases</h2>
        <button class="btn primary" onclick="App.newCase()">+ New case</button>
      </div>
      ${DB.cases.map(c=>{
        const nCards = c.test_cards.length;
        return `<div class="list-item">
          <div>
            <div class="li-name">${esc(c.case_name)}
              ${c.locked_status ? '<span class="tag warn">Locked</span>' : '<span class="tag grey">Unlocked</span>'}</div>
            <div class="muted" style="font-size:.85rem">${esc(c.description||"")} · ${nCards} test cards · updated ${new Date(c.updated_at).toLocaleString()}</div>
          </div>
          <div class="row">
            <button class="btn small" onclick="App.editCase('${esc(c.case_id)}')">Edit details</button>

            <button class="btn small" onclick="App.toggleLock('${esc(c.case_id)}')">${c.locked_status?"Unlock":"Lock"}</button>
            <button class="btn small" onclick="App.duplicateCase('${esc(c.case_id)}')">Duplicate</button>
            <button class="btn small danger" onclick="App.deleteCase('${esc(c.case_id)}')">Delete</button>
          </div>
        </div>`;
      }).join("") || `<p class="muted">No cases yet.</p>`}
      <div class="panel-h">Lock / unlock history</div>
      ${this.auditTable()}`;
  },

  auditTable(){
    const rows = DB.audit.slice().reverse().slice(0,40);
    if (!rows.length) return `<p class="muted">No audit entries yet.</p>`;
    return `<table class="data"><thead><tr><th>When</th><th>Case</th><th>Action</th><th>Detail</th></tr></thead><tbody>
      ${rows.map(a=>`<tr><td>${new Date(a.timestamp).toLocaleString()}</td>
        <td>${esc((getCase(a.case_id)||{}).case_name || a.case_id)}</td>
        <td>${esc(a.action)}</td><td>${esc(a.detail)}</td></tr>`).join("")}
      </tbody></table>`;
  },

  newCase(){
    this.caseForm(null);
  },
  editCase(id){
    this.caseForm(getCase(id));
  },
  caseForm(cs){
    const isNew = !cs;
    $("modal-box").innerHTML = `
      <h3>${isNew?"New case":"Edit case details"}</h3>
      <div class="field"><label>Case name</label><input type="text" id="cf-name" value="${esc(cs?cs.case_name:"")}"></div>
      <div class="field"><label>Description</label><input type="text" id="cf-desc" value="${esc(cs?cs.description:"")}"></div>
      <div class="field"><label>Assessment name</label><input type="text" id="cf-assess" value="${esc(cs?cs.assessment_name:"PTY1015 CA2 Practical")}"></div>
      <div class="row">
        <button class="btn primary" onclick="App.saveCase(${isNew?"null":"'"+esc(cs.case_id)+"'"})">Save</button>
        <button class="btn ghost" onclick="App.closeModal()">Cancel</button>
      </div>`;
    $("edit-modal").classList.add("open");
  },
  saveCase(id){
    const name = $("cf-name").value.trim();
    if (!name){ toast("Case name is required."); return; }
    if (id){
      const cs = getCase(id);
      if (cs.locked_status){ toast("Case is locked. Unlock first."); return; }
      cs.case_name = name; cs.description = $("cf-desc").value.trim();
      cs.assessment_name = $("cf-assess").value.trim(); cs.updated_at = nowISO();
      audit(id, "case_edited", "Case details updated");
    } else {
      const cid = "case_" + norm(name).replace(/ /g,"_").slice(0,40) + "_" + Date.now().toString(36);
      DB.cases.push({ case_id:cid, case_name:name, description:$("cf-desc").value.trim(),
        assessment_name:$("cf-assess").value.trim(), created_by:"admin",
        created_at:nowISO(), updated_at:nowISO(), locked_status:false,
        categories:[], test_cards:[] });
      audit(cid, "case_created", name);
    }
    saveDB(); this.closeModal(); this.renderCases(); toast("Saved.");
  },
  toggleLock(id){
    const cs = getCase(id);
    if (cs.locked_status){
      const why = prompt("Unlocking allows edits during/after setup. Who is unlocking, and why?");
      if (why === null) return;
      cs.locked_status = false;
      audit(id, "case_unlocked", why || "(no reason given)");
    } else {
      cs.locked_status = true;
      audit(id, "case_locked", "Locked for assessment");
    }
    cs.updated_at = nowISO(); saveDB(); this.renderCases();
  },
  duplicateCase(id){
    const cs = getCase(id);
    const copy = JSON.parse(JSON.stringify(cs));
    copy.case_id = cs.case_id + "_copy_" + Date.now().toString(36);
    copy.case_name = cs.case_name + " (copy)";
    copy.locked_status = false;
    copy.created_at = nowISO(); copy.updated_at = nowISO();
    DB.cases.push(copy);
    audit(copy.case_id, "case_duplicated", "From " + cs.case_name);
    saveDB(); this.renderCases(); toast("Case duplicated.");
  },
  deleteCase(id){
    const cs = getCase(id);
    if (cs.locked_status){ toast("Case is locked. Unlock first."); return; }
    if (!confirm(`Delete "${cs.case_name}" and all its test cards? Access logs are kept.`)) return;
    DB.cases = DB.cases.filter(c=>c.case_id!==id);
    audit(id, "case_deleted", cs.case_name);
    saveDB(); this.renderCases();
  },

  openEditorFor(id){ this.editorCaseId = id; this.adminTab("editor"); },

    body.innerHTML = `
      <div class="spread" style="margin-bottom:1rem">
        <div class="row">
          <div class="field" style="margin:0"><label>Case</label>
            <select onchange="App.openEditorFor(this.value)">
              ${DB.cases.map(c=>`<option value="${esc(c.case_id)}" ${c.case_id===cs.case_id?"selected":""}>${esc(c.case_name)}</option>`).join("")}
            </select></div>
          ${locked?'<span class="tag warn" style="align-self:end;margin-bottom:.4rem">Locked — editing disabled</span>':""}
        </div>
        <button class="btn primary" onclick="App.cardForm(null)" ${locked?"disabled":""}>+ New test card</button>
      </div>
      <div class="editor-cols">
        <div>
          <div class="spread"><div class="panel-h" style="margin-top:0">Categories &amp; subcategories</div>
            <button class="btn small" onclick="App.addCategory()" ${locked?"disabled":""}>+ Category</button></div>
          <div id="cat-list">${this.catListHTML(cs, locked)}</div>
        </div>
        <div>
          <div class="panel-h" style="margin-top:0">Test cards</div>
          <div id="card-list">${this.cardListHTML(cs, locked)}</div>
        </div>
      </div>`;
  },

  catListHTML(cs, locked){
    const cats = (cs.categories||[]).slice().sort((a,b)=>a.display_order-b.display_order);
    if (!cats.length) return `<p class="muted">No categories yet.</p>`;
    return cats.map((c,i)=>`
      <div class="list-item">
        <div class="li-name">${esc(c.category_name)} ${c.visible_status===false?'<span class="tag grey">Hidden</span>':""}</div>
        <div class="row">
          <button class="btn small ghost" ${locked||i===0?"disabled":""} onclick="App.moveCat('${esc(c.category_id)}',-1)">↑</button>
          <button class="btn small ghost" ${locked||i===cats.length-1?"disabled":""} onclick="App.moveCat('${esc(c.category_id)}',1)">↓</button>
          <button class="btn small" ${locked?"disabled":""} onclick="App.renameCat('${esc(c.category_id)}')">Rename</button>
          <button class="btn small" ${locked?"disabled":""} onclick="App.toggleCatVis('${esc(c.category_id)}')">${c.visible_status===false?"Show":"Hide"}</button>
          <button class="btn small" ${locked?"disabled":""} onclick="App.addSub('${esc(c.category_id)}')">+ Sub</button>
          <button class="btn small danger" ${locked?"disabled":""} onclick="App.deleteCat('${esc(c.category_id)}')">✕</button>
        </div>
      </div>
      ${(c.subcategories||[]).slice().sort((a,b)=>a.display_order-b.display_order).map((s,j,arr)=>`
        <div class="list-item sub">
          <div>${esc(s.subcategory_name)}</div>
          <div class="row">
            <button class="btn small ghost" ${locked||j===0?"disabled":""} onclick="App.moveSub('${esc(c.category_id)}','${esc(s.subcategory_id)}',-1)">↑</button>
            <button class="btn small ghost" ${locked||j===arr.length-1?"disabled":""} onclick="App.moveSub('${esc(c.category_id)}','${esc(s.subcategory_id)}',1)">↓</button>
            <button class="btn small" ${locked?"disabled":""} onclick="App.renameSub('${esc(c.category_id)}','${esc(s.subcategory_id)}')">Rename</button>
            <button class="btn small danger" ${locked?"disabled":""} onclick="App.deleteSub('${esc(c.category_id)}','${esc(s.subcategory_id)}')">✕</button>
          </div>
        </div>`).join("")}
    `).join("");
  },

  cardListHTML(cs, locked){
    const cards = cs.test_cards.slice().sort((a,b)=>{
      const ca = getCat(cs,a.category_id), cb = getCat(cs,b.category_id);
      return ((ca?ca.display_order:99)-(cb?cb.display_order:99)) || ((a.display_order||0)-(b.display_order||0));
    });
    if (!cards.length) return `<p class="muted">No test cards yet.</p>`;
    return cards.map(t=>`
      <div class="list-item">
        <div>
          <div class="li-name">${esc(t.test_name)} ${t.active_status===false?'<span class="tag grey">Inactive</span>':""}</div>
          <div class="muted" style="font-size:.82rem">${esc(catName(cs,t.category_id))} › ${esc(subName(cs,t.category_id,t.subcategory_id))}
            · ${t.is_side_specific?"side-specific":"not side-specific"}</div>
        </div>
        <div class="row">
          <button class="btn small" ${locked?"disabled":""} onclick="App.cardForm('${esc(t.test_card_id)}')">Edit</button>
          <button class="btn small" ${locked?"disabled":""} onclick="App.toggleCardActive('${esc(t.test_card_id)}')">${t.active_status===false?"Activate":"Deactivate"}</button>
          <button class="btn small danger" ${locked?"disabled":""} onclick="App.deleteCard('${esc(t.test_card_id)}')">✕</button>
        </div>
      </div>`).join("");
  },

  guardLocked(cs){
    if (cs.locked_status){ toast("Case is locked. Unlock it under Cases first."); return true; }
    return false;
  },

  addCategory(){
    const cs = getCase(this.editorCaseId); if (this.guardLocked(cs)) return;
    const name = prompt("Category name:"); if (!name) return;
    cs.categories.push({ category_id: uid("cat"), category_name: name.trim(),
      display_order: (cs.categories.length+1), visible_status: true, subcategories: [] });
    audit(cs.case_id,"category_added",name); cs.updated_at=nowISO(); saveDB(); this.renderEditor();
  },
  renameCat(id){
    const cs = getCase(this.editorCaseId); if (this.guardLocked(cs)) return;
    const c = getCat(cs,id);
    const name = prompt("Rename category:", c.category_name); if (!name) return;
    audit(cs.case_id,"category_renamed",c.category_name+" → "+name);
    c.category_name = name.trim(); cs.updated_at=nowISO(); saveDB(); this.renderEditor();
  },
  toggleCatVis(id){
    const cs = getCase(this.editorCaseId); if (this.guardLocked(cs)) return;
    const c = getCat(cs,id); c.visible_status = c.visible_status===false;
    audit(cs.case_id, c.visible_status?"category_shown":"category_hidden", c.category_name);
    saveDB(); this.renderEditor();
  },
  moveCat(id, dir){
    const cs = getCase(this.editorCaseId); if (this.guardLocked(cs)) return;
    const cats = cs.categories.slice().sort((a,b)=>a.display_order-b.display_order);
    const i = cats.findIndex(c=>c.category_id===id);
    const j = i + dir; if (j<0 || j>=cats.length) return;
    [cats[i].display_order, cats[j].display_order] = [cats[j].display_order, cats[i].display_order];
    saveDB(); this.renderEditor();
  },
  deleteCat(id){
    const cs = getCase(this.editorCaseId); if (this.guardLocked(cs)) return;
    const c = getCat(cs,id);
    const used = cs.test_cards.some(t=>t.category_id===id);
    if (used){ toast("Move or delete this category's test cards first."); return; }
    if (!confirm(`Delete category "${c.category_name}"?`)) return;
    cs.categories = cs.categories.filter(x=>x.category_id!==id);
    audit(cs.case_id,"category_deleted",c.category_name); saveDB(); this.renderEditor();
  },
  addSub(catId){
    const cs = getCase(this.editorCaseId); if (this.guardLocked(cs)) return;
    const c = getCat(cs,catId);
    const name = prompt("Subcategory name:"); if (!name) return;
    c.subcategories.push({ subcategory_id: uid("sub"), subcategory_name: name.trim(),
      display_order: c.subcategories.length+1, visible_status: true });
    audit(cs.case_id,"subcategory_added",c.category_name+" › "+name); saveDB(); this.renderEditor();
  },
  renameSub(catId, subId){
    const cs = getCase(this.editorCaseId); if (this.guardLocked(cs)) return;
    const s = getSub(getCat(cs,catId), subId);
    const name = prompt("Rename subcategory:", s.subcategory_name); if (!name) return;
    audit(cs.case_id,"subcategory_renamed",s.subcategory_name+" → "+name);
    s.subcategory_name = name.trim(); saveDB(); this.renderEditor();
  },
  moveSub(catId, subId, dir){
    const cs = getCase(this.editorCaseId); if (this.guardLocked(cs)) return;
    const c = getCat(cs,catId);
    const subs = c.subcategories.slice().sort((a,b)=>a.display_order-b.display_order);
    const i = subs.findIndex(s=>s.subcategory_id===subId);
    const j = i + dir; if (j<0 || j>=subs.length) return;
    [subs[i].display_order, subs[j].display_order] = [subs[j].display_order, subs[i].display_order];
    saveDB(); this.renderEditor();
  },
  deleteSub(catId, subId){
    const cs = getCase(this.editorCaseId); if (this.guardLocked(cs)) return;
    const c = getCat(cs,catId); const s = getSub(c, subId);
    if (cs.test_cards.some(t=>t.subcategory_id===subId)){
      toast("Move or delete this subcategory's test cards first."); return;
    }
    if (!confirm(`Delete subcategory "${s.subcategory_name}"?`)) return;
    c.subcategories = c.subcategories.filter(x=>x.subcategory_id!==subId);
    audit(cs.case_id,"subcategory_deleted",s.subcategory_name); saveDB(); this.renderEditor();
  },
  toggleCardActive(id){
    const cs = getCase(this.editorCaseId); if (this.guardLocked(cs)) return;
    const t = cs.test_cards.find(x=>x.test_card_id===id);
    t.active_status = t.active_status===false;
    audit(cs.case_id, t.active_status?"card_activated":"card_deactivated", t.test_name);
    saveDB(); this.renderEditor();
  },
  deleteCard(id){
    const cs = getCase(this.editorCaseId); if (this.guardLocked(cs)) return;
    const t = cs.test_cards.find(x=>x.test_card_id===id);
    if (!confirm(`Delete test card "${t.test_name}"?`)) return;
    cs.test_cards = cs.test_cards.filter(x=>x.test_card_id!==id);
    audit(cs.case_id,"card_deleted",t.test_name); saveDB(); this.renderEditor();
  },

  /* ============ admin: test card form ============ */
  cardForm(cardId){
    const cs = getCase(this.editorCaseId);
    if (this.guardLocked(cs)) return;
    const t = cardId ? cs.test_cards.find(x=>x.test_card_id===cardId) : null;
    const cats = cs.categories.slice().sort((a,b)=>a.display_order-b.display_order);
    if (!cats.length){ toast("Create at least one category and subcategory first."); return; }
    const selCat = t ? t.category_id : cats[0].category_id;
    const R = (t && t.results) || {};
    const g = (side, field) => esc((R[side] && R[side][field]) || "");
    $("modal-box").innerHTML = `
      <h3>${t?"Edit test card":"New test card"}</h3>
      <div class="grid2">
        <div class="field"><label>Test name</label><input type="text" id="tf-name" value="${esc(t?t.test_name:"")}"></div>
        <div class="field"><label>Response flag (optional)</label><input type="text" id="tf-flag" value="${esc(t?t.response_flag:"")}"></div>
      </div>
      <div class="field"><label>Aliases (comma-separated)</label>
        <input type="text" id="tf-aliases" value="${esc(t?(t.aliases||[]).join(", "):"")}" placeholder="e.g. Jobe, Empty can, Supraspinatus test"></div>
      <div class="grid2">
        <div class="field"><label>Category</label>
          <select id="tf-cat" onchange="App.refreshSubSelect()">
            ${cats.map(c=>`<option value="${esc(c.category_id)}" ${c.category_id===selCat?"selected":""}>${esc(c.category_name)}</option>`).join("")}
          </select></div>
        <div class="field"><label>Subcategory</label><select id="tf-sub"></select></div>
      </div>
      <div class="grid2">
        <div class="field"><label>Side-specific?</label>
          <select id="tf-side" onchange="App.refreshSideFields()">
            <option value="yes" ${t&&t.is_side_specific?"selected":""}>Yes — right / left</option>
            <option value="no" ${t&&!t.is_side_specific?"selected":""}>No — single result</option>
          </select></div>
        <div class="field"><label>Display order</label>
          <input type="number" id="tf-order" value="${t?(t.display_order||1):1}" min="1"></div>
      </div>
      <div class="field"><label>Caution note (optional)</label>
        <input type="text" id="tf-caution" value="${esc(t?t.caution_note:"")}"></div>

      <div id="tf-sides-yes">
        <div class="panel-h">Right side</div>
        <div class="field"><label>Result text</label><textarea id="tf-r-result">${g("right","result_text")}</textarea></div>
        <div class="field"><label>Patient wording (optional)</label><input type="text" id="tf-r-pw" value="${g("right","patient_wording")}"></div>
        <div class="panel-h">Left side</div>
        <div class="field"><label>Result text</label><textarea id="tf-l-result">${g("left","result_text")}</textarea></div>
        <div class="field"><label>Patient wording (optional)</label><input type="text" id="tf-l-pw" value="${g("left","patient_wording")}"></div>
        <div class="panel-h">Both sides — combined wording (optional)</div>
        <p class="muted" style="font-size:.83rem;margin-bottom:.6rem">If blank, "Both sides" shows the right and left results stacked.</p>
        <div class="field"><label>Result text</label><textarea id="tf-b-result">${g("bilateral","result_text")}</textarea></div>
        <div class="field"><label>Patient wording (optional)</label><input type="text" id="tf-b-pw" value="${g("bilateral","patient_wording")}"></div>
      </div>
      <div id="tf-sides-no">
        <div class="panel-h">Result</div>
        <div class="field"><label>Result text</label><textarea id="tf-s-result">${g("single","result_text") || g("not_side_specific","result_text")}</textarea></div>
        <div class="field"><label>Patient wording (optional)</label><input type="text" id="tf-s-pw" value="${g("single","patient_wording") || g("not_side_specific","patient_wording")}"></div>
      </div>

      <div class="row" style="margin-top:.6rem">
        <button class="btn primary" onclick="App.saveCard(${t?"'"+esc(t.test_card_id)+"'":"null"})">Save test card</button>
        <button class="btn ghost" onclick="App.closeModal()">Cancel</button>
      </div>`;
    $("edit-modal").classList.add("open");
    this.refreshSubSelect(t ? t.subcategory_id : null);
    this.refreshSideFields();
  },

  refreshSubSelect(selected){
    const cs = getCase(this.editorCaseId);
    const cat = getCat(cs, $("tf-cat").value);
    const subs = (cat.subcategories||[]).slice().sort((a,b)=>a.display_order-b.display_order);
    $("tf-sub").innerHTML = subs.length
      ? subs.map(s=>`<option value="${esc(s.subcategory_id)}" ${s.subcategory_id===selected?"selected":""}>${esc(s.subcategory_name)}</option>`).join("")
      : `<option value="">(no subcategories — add one first)</option>`;
  },

  refreshSideFields(){
    const yes = $("tf-side").value === "yes";
    $("tf-sides-yes").style.display = yes ? "" : "none";
    $("tf-sides-no").style.display = yes ? "none" : "";
  },

  saveCard(id){
    const cs = getCase(this.editorCaseId);
    if (this.guardLocked(cs)) return;
    const name = $("tf-name").value.trim();
    if (!name){ toast("Test name is required."); return; }
    if (!$("tf-sub").value){ toast("Assign a subcategory."); return; }
    const sideSpecific = $("tf-side").value === "yes";
    const results = {};
    if (sideSpecific){
      results.right = { result_text: $("tf-r-result").value.trim(), patient_wording: $("tf-r-pw").value.trim() };
      results.left  = { result_text: $("tf-l-result").value.trim(), patient_wording: $("tf-l-pw").value.trim() };
      const bt = $("tf-b-result").value.trim();
      if (bt) results.bilateral = { result_text: bt, patient_wording: $("tf-b-pw").value.trim() };
    } else {
      results.single = { result_text: $("tf-s-result").value.trim(), patient_wording: $("tf-s-pw").value.trim() };
    }
    const data = {
      test_name: name,
      aliases: $("tf-aliases").value.split(",").map(s=>s.trim()).filter(Boolean),
      category_id: $("tf-cat").value,
      subcategory_id: $("tf-sub").value,
      is_side_specific: sideSpecific,
      results,
      response_flag: $("tf-flag").value.trim(),
      caution_note: $("tf-caution").value.trim(),
      display_order: parseInt($("tf-order").value) || 1,
    };
    if (id){
      const t = cs.test_cards.find(x=>x.test_card_id===id);
      Object.assign(t, data);
      audit(cs.case_id,"card_edited",name);
    } else {
      cs.test_cards.push(Object.assign({ test_card_id: uid("card"), active_status: true }, data));
      audit(cs.case_id,"card_added",name);
    }
    cs.updated_at = nowISO(); saveDB(); this.closeModal(); this.renderEditor(); toast("Test card saved.");
  },

  closeModal(){ $("edit-modal").classList.remove("open"); },

    const u = k => [...new Set(DB.logs.map(l=>l[k]).filter(Boolean))].sort();

    body.innerHTML = `
      <h2 style="font-size:1.1rem;margin-bottom:1rem">Access / release log</h2>
      <div class="filters">
        <div class="field"><label>Case</label><select onchange="App.setLogFilter('case_name',this.value)">${opt(u("case_name"),f.case_name)}</select></div>
        <div class="field"><label>Session</label><select onchange="App.setLogFilter('assessment_session',this.value)">${opt(u("assessment_session"),f.assessment_session)}</select></div>
        <div class="field"><label>Group</label><select onchange="App.setLogFilter('group_number',this.value)">${opt(u("group_number"),f.group_number)}</select></div>
        <div class="field"><label>SP / examiner</label><select onchange="App.setLogFilter('sp_examiner_user',this.value)">${opt(u("sp_examiner_user"),f.sp_examiner_user)}</select></div>
        <div class="field"><label>Category</label><select onchange="App.setLogFilter('category_name',this.value)">${opt(u("category_name"),f.category_name)}</select></div>
        <div class="field"><label>Subcategory</label><select onchange="App.setLogFilter('subcategory_name',this.value)">${opt(u("subcategory_name"),f.subcategory_name)}</select></div>
        <div class="field"><label>Test</label><select onchange="App.setLogFilter('test_name',this.value)">${opt(u("test_name"),f.test_name)}</select></div>
      </div>
      <div class="kpi-row">
        <div class="kpi"><b>${logs.length}</b><span>log entries</span></div>
        <div class="kpi"><b>${groups.length}</b><span>groups</span></div>
        <div class="kpi"><b>${[...new Set(logs.map(l=>l.test_card_id+"|"+l.side_viewed+"|"+l.group_number))].length}</b><span>distinct releases</span></div>
      </div>
      <div class="row" style="margin-bottom:1rem">
        <button class="btn" onclick="App.exportLogs('json')">Export filtered — JSON</button>
        <button class="btn" onclick="App.exportLogs('csv')">Export filtered — CSV</button>
        <button class="btn danger" onclick="App.clearLogs()">Clear all logs</button>
      </div>
      ${this.groupSummaryHTML(logs)}
      <div class="panel-h">Entries (newest first)</div>
      ${logs.length ? `<div style="overflow-x:auto"><table class="data"><thead><tr>
          <th>When</th><th>Group</th><th>Test</th><th>Side</th><th>Category</th><th>Source</th><th>Repeat</th><th>SP</th><th>Session</th>
        </tr></thead><tbody>
        ${logs.slice().reverse().map(l=>`<tr>
          <td>${new Date(l.timestamp).toLocaleString()}</td>
          <td><b>${esc(l.group_number)}</b></td>
          <td>${esc(l.test_name)}</td>
          <td>${esc(l.side_viewed.replace(/_/g," "))}</td>
          <td>${esc(l.category_name)} › ${esc(l.subcategory_name)}</td>
          <td>${esc(l.accessed_from)}</td>
          <td>${l.repeat_view?"yes":""}</td>
          <td>${esc(l.sp_examiner_user)}</td>
          <td>${esc(l.assessment_session)}</td>
        </tr>`).join("")}
        </tbody></table></div>`
        : `<p class="muted">No log entries match the current filters.</p>`}`;
  },

  setLogFilter(k,v){ if (v) this.logFilters[k]=v; else delete this.logFilters[k]; this.renderLogs(); },

  filteredLogs(){
    return DB.logs.filter(l => Object.entries(this.logFilters).every(([k,v]) => l[k]===v));
  },

  groupSummaryHTML(logs){
    const byGroup = {};
    logs.forEach(l=>{
      const k = l.group_number + " — " + l.case_name;
      (byGroup[k] = byGroup[k] || new Map());
      const rk = l.test_name + " (" + l.side_viewed.replace(/_/g," ") + ")";
      byGroup[k].set(rk, (byGroup[k].get(rk)||0)+1);
    });
    const keys = Object.keys(byGroup).sort();
    if (!keys.length) return "";
    return `<div class="panel-h">What each group accessed</div>` + keys.map(k=>`
      <div class="card" style="margin-bottom:.7rem">
        <div class="spread"><b>Group ${esc(k)}</b>
          <button class="btn small" onclick="App.exportGroup('${esc(k.split(" — ")[0])}')">Export this group — JSON</button></div>
        <div class="muted" style="font-size:.88rem;margin-top:.4rem">
          ${[...byGroup[k].entries()].map(([t,n])=>esc(t)+(n>1?` ×${n}`:"")).join(" · ")}
        </div>
      </div>`).join("");
  },

  exportLogs(fmt){
    const logs = this.filteredLogs();
    if (fmt==="json"){
      download("pty1015_access_log.json", JSON.stringify(logs, null, 2));
    } else {
      const cols = ["timestamp","case_name","assessment_session","group_number","sp_examiner_user",
        "test_name","side_viewed","category_name","subcategory_name","accessed_from",
        "result_viewed","patient_wording_viewed","repeat_view","test_card_id","log_id"];
      const csv = cols.join(",") + "\n" +
        logs.map(l=>cols.map(c=>csvCell(l[c])).join(",")).join("\n");
      download("pty1015_access_log.csv", csv, "text/csv");
    }
    toast("Log exported.");
  },

  exportGroup(group){
    const logs = DB.logs.filter(l=>l.group_number===group);
    download(`pty1015_group_${group}_releases.json`, JSON.stringify(logs, null, 2));
    toast("Group " + group + " log exported.");
  },

  clearLogs(){
    if (!confirm("Delete ALL access logs on this device? Export first if you need them.")) return;
    if (!confirm("This cannot be undone. Confirm deletion of all logs?")) return;
    DB.logs = []; saveDB(); this.renderLogs(); toast("Logs cleared.");
  },

  exportCase(kind){
    const cs = getCase($("io-case").value);
    if (kind==="structure"){
      const out = { case_id: cs.case_id, case_name: cs.case_name,
        categories: cs.categories };
      download(cs.case_id + "_structure.json", JSON.stringify(out, null, 2));
    } else {
      download(cs.case_id + ".json", JSON.stringify(cs, null, 2));
    }
    toast("Exported.");
  },

  importCase(){
    const file = $("io-file").files[0];
    const pasted = $("io-paste").value.trim();
    const handle = text => {
      let obj;
      try { obj = JSON.parse(text); }
      catch(e){ toast("Invalid JSON: " + e.message); return; }
      this.ingestCase(obj);
    };
    if (file){
      const r = new FileReader();
      r.onload = () => handle(r.result);
      r.readAsText(file);
    } else if (pasted){
      handle(pasted);
    } else {
      toast("Choose a file or paste JSON first.");
    }
  },

  ingestCase(obj){
    if (!obj || !obj.case_id || !obj.case_name){
      toast("JSON must include case_id and case_name."); return;
    }
    obj.categories = obj.categories || [];
    obj.test_cards = (obj.test_cards || []).map(t => {
      // normalise flat-field variants of the data model into the nested results object
      if (!t.results){
        t.results = {};
        if (t.right_result || t.left_result){
          t.results.right = { result_text: t.right_result||"", patient_wording: t.right_patient_wording||"" };
          t.results.left  = { result_text: t.left_result||"",  patient_wording: t.left_patient_wording||"" };
          if (t.bilateral_result) t.results.bilateral = { result_text: t.bilateral_result, patient_wording: t.bilateral_patient_wording||"" };
          t.is_side_specific = true;
        } else {
          t.results.single = { result_text: t.not_side_specific_result||"", patient_wording: t.not_side_specific_patient_wording||"" };
          t.is_side_specific = false;
        }
      }
      if (t.results.not_side_specific && !t.results.single) t.results.single = t.results.not_side_specific;
      t.aliases = t.aliases || [];
      t.active_status = t.active_status !== false;
      return t;
    });
    obj.locked_status = !!obj.locked_status;
    obj.created_at = obj.created_at || nowISO();
    obj.updated_at = nowISO();
    obj.assessment_name = obj.assessment_name || "";
    obj.description = obj.description || "";
    const existing = getCase(obj.case_id);
    if (existing){
      if (!confirm(`A case with id "${obj.case_id}" already exists ("${existing.case_name}"). Replace it?`)) return;
      DB.cases = DB.cases.map(c => c.case_id===obj.case_id ? obj : c);
      audit(obj.case_id, "case_replaced_by_import", obj.case_name);
    } else {
      DB.cases.push(obj);
      audit(obj.case_id, "case_imported", obj.case_name);
    }
    saveDB();
    $("io-paste").value=""; $("io-file").value="";
    toast(`Imported "${obj.case_name}" — ${obj.test_cards.length} test cards.`);
    this.renderIO();
  },

  exportBackup(){
    download("pty1015_lookup_backup_" + new Date().toISOString().slice(0,10) + ".json",
      JSON.stringify(DB, null, 2));
    toast("Backup exported.");
  },

  restoreBackup(input){
    const file = input.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = () => {
      let obj;
      try { obj = JSON.parse(r.result); }
      catch(e){ toast("Invalid backup file."); return; }
      if (!obj.cases || !obj.settings){ toast("Not a valid backup file."); return; }
      if (!confirm("Replace ALL data on this device with this backup?")) return;
      DB = obj; saveDB(); toast("Backup restored.");
      this.renderIO();
    };
    r.readAsText(file);
    input.value = "";
  },

  /* ============ admin: settings ============ */
  renderSettings(){
    $("admin-body").innerHTML = `
      <h2 style="font-size:1.1rem;margin-bottom:1rem">Settings</h2>
      <div class="card" style="max-width:440px;margin-bottom:1rem">
        <div class="panel-h" style="margin-top:0">SP / examiner passcode</div>
        <p class="muted" style="font-size:.85rem;margin-bottom:.7rem">
          Required to start an SP session. Current passcode: <code id="sp-pass-show">••••••</code>
          <button class="btn small ghost" onclick="App.revealSPPass()">show</button></p>
        <div class="field"><label>New SP passcode</label><input type="password" id="set-sp-pass"></div>
        <button class="btn primary" onclick="App.changeSPPass()">Change SP passcode</button>
      </div>
      <div class="card" style="max-width:440px">
        <div class="panel-h" style="margin-top:0">Admin passcode</div>
        <div class="field"><label>New passcode</label><input type="password" id="set-pass"></div>
        <button class="btn primary" onclick="App.changePass()">Change passcode</button>
        <p class="muted" style="font-size:.83rem;margin-top:.8rem">
          The passcodes deter casual access on a shared device. They are not cryptographic security:
          anyone with the file and developer tools can read the data. Do not distribute this file to students.</p>
      </div>`;
  },
  revealSPPass(){ $("sp-pass-show").textContent = DB.settings.spPass; },
  changeSPPass(){
    const p = $("set-sp-pass").value.trim();
    if (p.length < 4){ toast("Use at least 4 characters."); return; }
    DB.settings.spPass = p; saveDB();
    $("set-sp-pass").value = ""; $("sp-pass-show").textContent = "••••••";
    toast("SP passcode changed.");
  },
  changePass(){
    const p = $("set-pass").value.trim();
    if (p.length < 4){ toast("Use at least 4 characters."); return; }
    DB.settings.adminPass = p; saveDB();
    $("set-pass").value = ""; toast("Passcode changed.");
  }
};

document.addEventListener("DOMContentLoaded", () => App.init());
</script>
</body>
</html>
